name: Android CI

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install SDK platform
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew --version 2>&1 | tee gradle-version.log
          ./gradlew --no-daemon --max-workers=2 assembleDebug --stacktrace --info --console=plain 2>&1 | tee build.log

      - name: Print build log tail on failure
        if: failure()
        run: |
          echo "===== GRADLE VERSION ====="
          cat gradle-version.log || true
          echo "===== BUILD LOG TAIL ====="
          tail -n 400 build.log || true
          cp build.log build-error-tail.txt || true

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luckystar-android-build-logs
          path: |
            android-app/build.log
            android-app/gradle-version.log
            android-app/build-error-tail.txt
          if-no-files-found: warn

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: luckystar-android-debug
          path: android-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
